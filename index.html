<style>
    :root{
      --bg:#0C0F13;
      --card:#121620;
      --text:#F5F7FA;
      --muted:#A7B0C2;
      --gold:#D9AE5F;
      --petrol:#0F4C5C;
      --accent:#5FD1B8;
      --line:#222636;
      --danger:#ff8585;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    html,body{
      margin:0;
      min-height:100%;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial,sans-serif;
    }
    body{background:var(--bg);color:var(--text);line-height:1.6}
    a{color:inherit;text-decoration:none}
    img,video,iframe{max-width:100%;display:block}
    button,input,textarea,select{font:inherit}
    section{scroll-margin-top:110px;padding:68px 0}
    h1,h2{font-family:"Playfair Display",serif}
    h1{font-size:clamp(36px,5vw,58px);line-height:1.06;margin:14px 0}
    h2{font-size:clamp(28px,3vw,40px);line-height:1.15;margin:0 0 14px}
    h3{margin-top:0}
    p{margin-top:0}
    .container{width:min(1120px,92%);margin:auto}
    .muted{color:var(--muted)}
    .gold{color:var(--gold)}
    .center{text-align:center}
    .shadow-xl{box-shadow:0 15px 40px rgba(0,0,0,.35)}
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
    }
    .accent-bar{
      width:64px;height:6px;
      background:linear-gradient(90deg,var(--gold),var(--petrol));
      border-radius:999px;
      margin:10px 0 18px;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      background:#0b0f14;
      border:1px solid #1e2330;
      color:var(--muted);
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
    }
    .tag-row{display:flex;flex-wrap:wrap;gap:10px;margin:18px 0}
    .grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:24px}
    .grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:20px}
    .stack{display:grid;gap:14px}
    .section-heading{max-width:720px;margin-bottom:26px}

    /* Botones originales con mejoras de accesibilidad */
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      min-height:52px;
      padding:14px 24px;
      border-radius:14px;
      border:0;
      font-weight:700;
      letter-spacing:.2px;
      transition:.25s ease;
      cursor:pointer;
      font-size:1rem;
    }
    .btn:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(217,174,95,.45)}
    .btn-primary{
      background:#0b0f14;
      color:var(--gold);
      border:2px solid var(--gold);
      position:relative;
      overflow:hidden;
    }
    .btn-primary:hover{
      transform:translateY(-3px);
      box-shadow:0 0 16px rgba(217,174,95,.48),0 14px 30px rgba(0,0,0,.38);
    }
    .btn:active{transform:translateY(1px) scale(.985)}
    .card,.feature{transition:transform .25s ease,box-shadow .25s ease,border-color .25s ease}
    .card:hover,.feature:hover{
      transform:translateY(-4px);
      box-shadow:0 16px 34px rgba(0,0,0,.28);
      border-color:rgba(217,174,95,.38);
    }
    .btn-ghost{border:1px solid #2a2f3c;color:var(--text);background:transparent}
    .btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
    .btn-small{min-height:44px;padding:10px 16px;font-size:.92rem}
    .button-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:22px}
    .whatsapp-icon{width:20px;height:20px;filter:invert(73%) sepia(39%) saturate(460%) hue-rotate(5deg) brightness(95%) contrast(89%)}

    /* Encabezado */
    header{
      position:sticky;
      top:0;
      z-index:40;
      background:rgba(12,15,19,.88);
      backdrop-filter:blur(10px);
      border-bottom:1px solid #1c2130;
    }
    nav[aria-label="Principal"]{
      min-height:84px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:max-content;
    }
    .brand img{
      width:50px;
      height:50px;
      object-fit:contain;
      animation:goldPulse 3s ease-in-out infinite alternate;
    }
    .brand-copy{display:flex;flex-direction:column}
    .brand strong{
      font-family:"Playfair Display",serif;
      color:var(--gold);
      letter-spacing:.4px;
      font-size:21px;
      line-height:1;
      animation:goldPulse 3s ease-in-out infinite alternate;
    }
    .brand small{color:var(--muted);font-size:11px;margin-top:5px}
    @keyframes goldPulse{
      0%{filter:drop-shadow(0 0 0 rgba(217,174,95,0));text-shadow:none}
      50%{filter:drop-shadow(0 0 14px rgba(217,174,95,.7));text-shadow:0 0 14px rgba(217,174,95,.65)}
      100%{filter:drop-shadow(0 0 0 rgba(217,174,95,0));text-shadow:none}
    }
    .nav-links{
      display:flex;
      align-items:center;
      gap:22px;
      list-style:none;
      margin:0;
      padding:0;
    }
    .nav-links a:not(.btn):hover{color:var(--gold)}

    /* Menú principal y submenús */
    .menu-panel{display:flex;align-items:center}
    .menu-toggle{
      display:none;
      width:46px;
      height:46px;
      padding:10px;
      border-radius:12px;
      border:1px solid #2a2f3c;
      background:#0b0f14;
      cursor:pointer;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:5px;
      transition:.25s ease;
    }
    .menu-toggle:hover{
      border-color:var(--gold);
      box-shadow:0 0 14px rgba(217,174,95,.22);
    }
    .menu-toggle span{
      display:block;
      width:22px;
      height:2px;
      border-radius:999px;
      background:var(--gold);
      transition:.25s ease;
    }
    .menu-toggle.is-open span:nth-child(1){
      transform:translateY(7px) rotate(45deg);
    }
    .menu-toggle.is-open span:nth-child(2){
      opacity:0;
    }
    .menu-toggle.is-open span:nth-child(3){
      transform:translateY(-7px) rotate(-45deg);
    }

    .nav-links{
      display:flex;
      align-items:center;
      gap:10px;
      list-style:none;
      margin:0;
      padding:0;
    }
    .nav-links > li{position:relative}
    .nav-links a,
    .submenu-toggle{
      color:var(--text);
      background:transparent;
      border:0;
      cursor:pointer;
      font-weight:600;
      padding:12px 13px;
      border-radius:10px;
      transition:.22s ease;
      display:inline-flex;
      align-items:center;
      gap:6px;
      white-space:nowrap;
    }
    .nav-links a:not(.btn):hover,
    .submenu-toggle:hover,
    .submenu-toggle[aria-expanded="true"]{
      color:var(--gold);
      background:rgba(217,174,95,.06);
    }
    .submenu-toggle span{
      font-size:13px;
      transition:transform .22s ease;
    }
    .submenu-toggle[aria-expanded="true"] span{
      transform:rotate(180deg);
    }

    .submenu{
      position:absolute;
      top:calc(100% + 10px);
      left:0;
      min-width:235px;
      margin:0;
      padding:10px;
      list-style:none;
      background:rgba(10,13,18,.98);
      border:1px solid rgba(217,174,95,.22);
      border-radius:16px;
      box-shadow:0 18px 40px rgba(0,0,0,.45);
      backdrop-filter:blur(12px);
      opacity:0;
      visibility:hidden;
      transform:translateY(-8px);
      pointer-events:none;
      transition:.22s ease;
      z-index:60;
    }
    .has-submenu:hover > .submenu,
    .has-submenu:focus-within > .submenu,
    .has-submenu.is-open > .submenu{
      opacity:1;
      visibility:visible;
      transform:translateY(0);
      pointer-events:auto;
    }
    .submenu li + li{margin-top:4px}
    .submenu a{
      width:100%;
      padding:11px 12px;
      color:var(--muted);
      justify-content:flex-start;
    }
    .submenu a:hover{
      color:var(--gold)!important;
      background:rgba(217,174,95,.08)!important;
      transform:translateX(3px);
    }
    .nav-links a.is-active{
      color:var(--gold);
      background:rgba(217,174,95,.08);
    }
    .nav-cta{margin-left:6px}
    .nav-cta .btn{padding-inline:18px}

    @media (max-width: 1050px){
      nav[aria-label="Principal"]{
        min-height:78px;
      }
      .menu-toggle{display:flex}
      .menu-panel{
        position:absolute;
        top:calc(100% + 1px);
        left:0;
        right:0;
        display:block;
        max-height:0;
        overflow:hidden;
        background:rgba(12,15,19,.98);
        border-bottom:1px solid #1c2130;
        box-shadow:0 18px 35px rgba(0,0,0,.38);
        transition:max-height .3s ease;
      }
      .menu-panel.is-open{
        max-height:78vh;
        overflow-y:auto;
      }
      .nav-links{
        width:min(1120px,92%);
        margin:0 auto;
        padding:14px 0 20px;
        flex-direction:column;
        align-items:stretch;
        gap:4px;
      }
      .nav-links > li{width:100%}
      .nav-links a,
      .submenu-toggle{
        width:100%;
        justify-content:space-between;
        padding:14px 15px;
      }
      .submenu{
        position:static;
        min-width:0;
        max-height:0;
        overflow:hidden;
        opacity:1;
        visibility:visible;
        transform:none;
        pointer-events:auto;
        padding:0 8px;
        border:0;
        box-shadow:none;
        background:rgba(255,255,255,.018);
        border-radius:12px;
        transition:max-height .25s ease,padding .25s ease;
      }
      .has-submenu.is-open > .submenu{
        max-height:260px;
        padding:8px;
      }
      .submenu a{
        padding:11px 14px 11px 24px;
        font-size:.95rem;
      }
      .nav-cta{
        margin-left:0;
        padding-top:8px;
      }
      .nav-cta .btn{
        justify-content:center;
      }
    }

    @media (max-width: 580px){
      .menu-panel.is-open{max-height:82vh}
      .brand-copy small{display:none}
    }

    /* Hero */
    .hero{
      padding:86px 0 56px;
      display:grid;
      grid-template-columns:1.08fr .92fr;
      gap:38px;
      align-items:center;
    }
    .hero p{color:var(--muted);font-size:clamp(16px,1.5vw,19px);max-width:680px}
    .hero-media{
      position:relative;
      min-height:430px;
      overflow:hidden;
      background:
        linear-gradient(180deg,rgba(12,15,19,.05),rgba(12,15,19,.68)),
        url("https://images.unsplash.com/photo-1490645935967-10de6ba17061?q=80&w=1600&auto=format&fit=crop") center/cover;
    }
    .hero-badge{
      position:absolute;
      left:20px;
      right:20px;
      bottom:20px;
      padding:18px;
      background:rgba(12,15,19,.88);
      border:1px solid rgba(217,174,95,.45);
      border-radius:16px;
      backdrop-filter:blur(8px);
    }
    .hero-badge strong{display:block;color:var(--gold);font-size:1.15rem}
    .hero-badge span{color:var(--muted);font-size:.92rem}
    .price-line{
      display:flex;
      align-items:flex-end;
      gap:10px;
      margin:18px 0 4px;
    }
    .price{font-family:"Playfair Display",serif;color:var(--gold);font-size:42px;line-height:1}
    .price-note{color:var(--muted);padding-bottom:4px}
    .price-summary{
      display:inline-flex;
      flex-direction:column;
      gap:2px;
      margin-top:16px;
      padding:11px 14px;
      border-radius:12px;
      border:1px solid rgba(217,174,95,.28);
      background:linear-gradient(180deg,rgba(217,174,95,.08),rgba(15,76,92,.08));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
    }
    .price-summary strong{color:var(--gold);font-size:.98rem}
    .price-summary span{color:var(--muted);font-size:.82rem}

    /* Características y servicios */
    .feature{
      padding:24px;
      border-radius:18px;
      border:2px solid rgba(217,174,95,.28);
      background:linear-gradient(180deg,#141827,#10131c);
    }
    .feature h3{margin-bottom:7px}
    .feature p{color:var(--muted);margin-bottom:0}
    .service-card{padding:25px;display:flex;flex-direction:column}
    .service-card.highlight{border:2px solid rgba(217,174,95,.48)}
    .service-card .service-price{
      color:var(--gold);
      font-family:"Playfair Display",serif;
      font-size:32px;
      margin:4px 0 10px;
    }
    .service-card ul{color:var(--muted);padding-left:20px}
    .service-card .btn{margin-top:auto}

    /* Método y perfil */
    .check-list{padding:0;margin:20px 0;list-style:none;display:grid;gap:12px}
    .check-list li{color:var(--muted);padding-left:31px;position:relative}
    .check-list li::before{
      content:"✓";
      position:absolute;
      left:0;
      top:-1px;
      color:var(--gold);
      font-weight:700;
      font-size:19px;
    }
    .profile-panel{padding:26px}
    .profile-image{
      min-height:410px;
      background:
